<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tank Trouble</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 2px solid #e94560;
      border-radius: 4px;
    }
    #ui-overlay {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #eee;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div>Player 1: WASD + Space &nbsp; | &nbsp; Player 2: Arrow Keys + Enter</div>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
